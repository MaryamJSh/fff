<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دعوة فاطمة وعمر</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri&family=Tajawal:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body { background-color: #f4f1ea; margin: 0; font-family: 'Tajawal', sans-serif; display: flex; justify-content: center; padding: 20px 0; }
        .main-container { max-width: 450px; width: 100%; background: white; box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: center; border-radius: 15px; overflow: hidden; padding-bottom: 30px; }
        .invitation-img { width: 100%; display: block; }
        
        /* تنسيق جملة تأكيد الحضور كزر قابل للضغط */
        .rsvp-toggle-btn {
            font-family: 'Amiri', serif;
            color: #d4af37;
            font-size: 28px;
            cursor: pointer;
            margin: 30px 0;
            display: inline-block;
            transition: 0.3s;
            border-bottom: 1px solid transparent;
        }
        .rsvp-toggle-btn:hover { border-bottom-color: #d4af37; transform: scale(1.05); }

        /* إخفاء جزئية النموذج في البداية */
        #rsvp-form-container {
            display: none; /* مخفي افتراضياً */
            padding: 0 20px;
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        input, select {
            width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #f0f0f0; border-radius: 8px;
            background: #fafafa; font-family: 'Tajawal', sans-serif; box-sizing: border-box;
        }
        
        button {
            width: 100%; padding: 15px; background-color: #d4af37; color: white; border: none;
            border-radius: 30px; font-size: 18px; cursor: pointer; margin-top: 15px; font-weight: bold;
        }
        .footer-text { margin-top: 30px; font-size: 13px; color: #ccc; }
    </style>
</head>
<body>

<div class="main-container">
    <img src="https://i.postimg.cc/hvxMMfxQ/dʿwt-zfaf-blwn-wrdy-wedding-invitation.png" class="invitation-img">

    <div class="rsvp-toggle-btn" onclick="toggleRSVP()">تأكيد الحضور</div>

    <div id="rsvp-form-container">
        <form action="https://formspree.io/f/mzdoaeqv" method="POST">
            <input type="text" name="الاسم" placeholder="الاسم الكريم" required>
            <select name="الحضور" required>
                <option value="" disabled selected>هل ستشرفينا بالحضور؟</option>
                <option value="نعم">نعم، بكل سرور</option>
                <option value="لا">نعتذر عن الحضور</option>
            </select>
            <input type="number" name="المرافقين" placeholder="عدد المرافقين">
            <button type="submit">إرسال الرد</button>
        </form>
    </div>

    <div class="footer-text">دامت دياركم بالأفراح عامرة</div>
</div>

<script>
    function toggleRSVP() {
        var form = document.getElementById("rsvp-form-container");
        if (form.style.display === "none" || form.style.display === "") {
            form.style.display = "block";
            // تمرير الصفحة للأسفل لتظهر الخانات بوضوح
            form.scrollIntoView({ behavior: 'smooth' });
        } else {
            form.style.display = "none";
        }
    }
</script>

</body>
</html>
